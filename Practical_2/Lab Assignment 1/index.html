<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MNIST CNN Training Demo</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            max-width: 820px;
            margin: 40px auto;
            padding: 0 20px;
            background: #fafafa;
            color: #2f3640;
        }
        h1 {
            font-size: 22px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 6px;
        }
        button {
            background: #222;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 4px;
            cursor: pointer;
            margin: 20px 0;
        }
        button:disabled {
            background: #aaa;
        }
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        .panel {
            border: 1px solid #e5e5e5;
            padding: 16px;
            border-radius: 6px;
        }
        .panel-title {
            font-size: 12px;
            color: #777;
            text-transform: uppercase;
        }
        .score {
            font-size: 25px;
            font-weight: bold;
            margin: 8px 0;
        }
    </style>
</head>
<body>

<h1>Digit Classification using TensorFlow.js</h1>
<p>Epoch-wise logs are visible in the <b>browser console (F12)</b>.</p>

<button id="goBtn" onclick="executeTraining()">Execute Training</button>

<div class="layout">
    <div class="panel">
        <div class="panel-title">CNN Accuracy</div>
        <div id="cnnScore" class="score">--</div>
        <div id="cnnMsg">Not started</div>
    </div>

    <div class="panel">
        <div class="panel-title">Dense Accuracy</div>
        <div id="denseScore" class="score">--</div>
        <div id="denseMsg">Not started</div>
    </div>
</div>

<script>
async function executeTraining() {
    const btn = document.getElementById("goBtn");
    btn.disabled = true;

    console.log("=== Training Session Started ===");

    // Generate dummy MNIST-like data
    const images = tf.randomNormal([180, 28, 28, 1]);
    const labels = tf.oneHot(
        tf.tensor1d(
            Array.from({ length: 180 }, () => Math.floor(Math.random() * 10)),
            "int32"
        ),
        10
    );

    // CNN model
    const cnnNet = tf.sequential();
    cnnNet.add(tf.layers.conv2d({
        inputShape: [28, 28, 1],
        filters: 12,
        kernelSize: 3,
        activation: "relu"
    }));
    cnnNet.add(tf.layers.flatten());
    cnnNet.add(tf.layers.dense({ units: 10, activation: "softmax" }));
    cnnNet.compile({
        optimizer: "adam",
        loss: "categoricalCrossentropy",
        metrics: ["accuracy"]
    });

    // Dense model
    const denseNet = tf.sequential();
    denseNet.add(tf.layers.flatten({ inputShape: [28, 28, 1] }));
    denseNet.add(tf.layers.dense({ units: 96, activation: "relu" }));
    denseNet.add(tf.layers.dense({ units: 10, activation: "softmax" }));
    denseNet.compile({
        optimizer: "adam",
        loss: "categoricalCrossentropy",
        metrics: ["accuracy"]
    });

    async function fitModel(net, label, msgId, scoreId) {
        console.log(`\nTraining ${label} network`);
        document.getElementById(msgId).innerText = "Training...";

        const hist = await net.fit(images, labels, {
            epochs: 3,
            callbacks: {
                onEpochEnd: (ep, logs) => {
                    console.log(
                        `${label} | Epoch ${ep + 1} | Loss: ${logs.loss.toFixed(4)} | Acc: ${logs.acc.toFixed(4)}`
                    );
                }
            }
        });

        const acc = (hist.history.acc.at(-1) * 100).toFixed(1);
        document.getElementById(scoreId).innerText = acc + "%";
        document.getElementById(msgId).innerText = "Completed";

        return acc;
    }

    const cnnFinal = await fitModel(cnnNet, "CNN", "cnnMsg", "cnnScore");
    const denseFinal = await fitModel(denseNet, "Dense", "denseMsg", "denseScore");

    console.log("\n=== Training Finished ===");
    console.log(`CNN Final Accuracy: ${cnnFinal}%`);
    console.log(`Dense Final Accuracy: ${denseFinal}%`);

    images.dispose();
    labels.dispose();

    btn.disabled = false;
}
</script>

</body>
</html>
